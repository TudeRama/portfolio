<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="dark:bg-dark">
    <!-- Header section -->
    <header class="bg-transparent absolute top-0 left-0 w-full flex items-center z-10">
        <div class="container">
            <div class="flex items-center justify-between relative">
                <div class="px-4">
                    <a href="#hero" class="font-bold bg-gradient-to-r from-blue-500 to-pink-500 bg-clip-text text-transparent block py-6 text-lg">Tude Rama</a>
                </div>
                <div class="flex items-center px-4">
                    <button id="hamburger" name="hamburger" type="button" class="block absolute right-4 lg:hidden ">
                        <span class="hamburger-line transition duration-300 ease-in-out origin-top-left"></span>
                        <span class="hamburger-line transition duration-300 ease-in-out"></span>
                        <span class="hamburger-line transition duration-300 ease-in-out origin-bottom-left"></span>
                    </button>

                    <nav id="nav-menu" class="hidden absolute py-5 bg-white dark:bg-dark shadow-lg rounded-lg max-w-[250px] w-full right-4 top-full lg:block lg:max-w-full lg:static lg:bg-transparent lg:rounded-none lg:shadow-none">
                        <ul class="block lg:flex">
                            <li class="group">
                                <a href="#hero" class="text-base font-semibold text-dark py-2 mx-8 group-hover:text-primary flex border-b lg:border-b-0 dark:text-slate-400 dark:border-slate-400">Home</a>
                            </li>
                            <li class="group">
                                <a href="about.html" class="text-base font-semibold text-dark py-2 mx-8 group-hover:text-primary flex border-b lg:border-b-0 dark:text-slate-400 dark:border-slate-400">About</a>
                            </li>
                            <li class="group">
                                <a href="project.html" class="text-base font-semibold text-dark py-2 mx-8 group-hover:text-primary flex border-b lg:border-b-0 dark:text-slate-400 dark:border-slate-400">Project</a>
                            </li>
                            <li class="group">
                                <div class="text-base  text-dark py-2 mx-8 flex border-b lg:border-b-0 dark:text-slate-400 dark:border-slate-400">
                                    <span class="mr-2">Light</span>
                                    <input type="checkbox" id="toggle" class="hidden">
                                    <label for="toggle">
                                        <div class="flex h-5 w-9 cursor-pointer items-center rounded-full bg-slate-500 p-1">
                                            <div class="toggle-circle rounded-full h-4 w-4 bg-white transition duration-300 ease-in-out"></div>
                                        </div>
                                    </label>
                                    <span class="ml-2">Dark</span>
                                </div>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero section -->
    <section id="hero" class="pt-20">
        <div class="container">
            <div class="flex flex-wrap mt-5">
                <div class="w-full self-center px-4 lg:w-1/2">
                    <p class="text-base font-semibold text-dark md:text-xl lg:text-2xl dark:text-slate-400">Halo Semua, perkenalkan nama saya <span class="block font-bold bg-gradient-to-r from-blue-500 to-pink-500 bg-clip-text text-transparent text-4xl lg:text-5xl">I Putu Tude Rama Prasatya</span></p>
                    <p class="font-medium text-slate-400 mb-10 leading-relaxed">Jadilah orang yang disiplin, bekerja keras, kerja tuntas dan kerja cerdas</p>
                    <a href="wa" class="text-base font-semibold text-white bg-gradient-to-r from-blue-500 to-pink-500 py-3 px-8 rounded-full hover:shadow-lg hover:bg-opacity-80 transition duration-300 ease-in">Hubungi saya</a>
                </div>
                <div class="w-full self-end px-4 lg:w-1/2">
                    <div class="mt-5">
                        <img src="/src/img/hero2.png" alt="" class="max-w-full mx-auto rounded-lg shadow-lg">
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Footer section -->
    <section id="footer" class="bg-dark mt-10">
        <div class="container py-5 text-slate-300 ">
            <div class="w-full px-4 text-center">
                <h1>Develop with ❤ by Tude Rama</h1>
                <h2>Copyright all reserved 2023</h2>
            </div>
        </div>

<script src="/src/script.js"></script>
